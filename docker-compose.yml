  #   restart: unless-stopped
  #   environment:
  #     MYSQL_DATABASE: ${DB_DATABASE}
  #     MYSQL_USER: ${DB_USERNAME}
  #     MYSQL_PASSWORD: ${DB_PASSWORD}
  #     MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
  #   expose:
  #     - '3306'
  #   volumes:
  #     - dbdata:/var/lib/mysql
  #   healthcheck:
  #     test:
  #       [
  #         'CMD-SHELL',
  #         'mysqladmin ping -h localhost -u root -p$$MYSQL_ROOT_PASSWORD || exit 1',
  #       ]
  #     interval: 10s
  #     timeout: 5s
  #     retries: 10
  #     start_period: 20s
  #   networks:
  #     - honest_ai

  ssr:
    build:
      context: .
      dockerfile: docker/ssr/Dockerfile
    container_name: honest_ai_ssr
    restart: unless-stopped
    expose:
      - '13714'
    networks:
      - honest_ai

networks:
  honest_ai:
    driver: bridge

volumes:
  # dbdata:
  storage_data:
  cache_data:
