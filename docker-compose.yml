services:
  app:
    build:
      context: .
      target: app
    container_name: honest_ai_app
    restart: unless-stopped
    working_dir: /var/www
    env_file:
      - .env
    environment:
      APP_ENV: production
      APP_DEBUG: 'false'
    # depends_on:
    #   db:
    #     condition: service_healthy
    volumes:
      - storage_data:/var/www/storage
      - cache_data:/var/www/bootstrap/cache
    networks:
      - honest_ai

  nginx:
    build:
      context: .
      dockerfile: docker/nginx/Dockerfile
    container_name: honest_ai_nginx
    restart: unless-stopped
    expose:
      - '80'
    depends_on:
      - app
    networks:
      - honest_ai
      - proxy
    labels:
      - traefik.enable=true
      - traefik.docker.network=${PROXY_NETWORK}
      - traefik.http.routers.honest-ai.rule=Host(`${APP_DOMAIN}`)
      - traefik.http.routers.honest-ai.entrypoints=websecure
      - traefik.http.routers.honest-ai.tls=true
      - traefik.http.services.honest-ai.loadbalancer.server.port=80
      - monitoring.blackbox.enable=true
      - monitoring.blackbox.hostname=${APP_DOMAIN}
      - monitoring.blackbox.scheme=https
      - monitoring.blackbox.path=/

  ssr:
    build:
      context: .
      dockerfile: docker/ssr/Dockerfile
    container_name: honest_ai_ssr
    restart: unless-stopped
    expose:
      - '13714'
    networks:
      - honest_ai

networks:
  honest_ai:
    driver: bridge
  proxy:
    name: ${PROXY_NETWORK}
    external: true

volumes:
  # dbdata:
  storage_data:
  cache_data:
