services:
  app:
    build:
      context: .
      target: app
    container_name: honest_ai_app
    restart: unless-stopped
    working_dir: /var/www
    env_file:
      - .env
    environment:
      APP_ENV: production
      APP_DEBUG: 'false'
    # depends_on:
    #   db:
    #     condition: service_healthy
    volumes:
      - storage_data:/var/www/storage
      - cache_data:/var/www/bootstrap/cache
    networks:
      - honest_ai

  nginx:
    build:
      context: .
      dockerfile: docker/nginx/Dockerfile
    container_name: honest_ai_nginx
    restart: unless-stopped
    ports:
      - '80:80'
    depends_on:
      - app
    networks:
      - honest_ai

  # db:
  #   image: mysql:8.0
